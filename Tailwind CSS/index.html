<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="mt-20 mx-80 flex flex-wrap rounded border-2">
        <!-- Quote Container -->
        <div class="h-20 w-full bg-linear-to-t from-sky-500 to-indigo-500 text-white flex items-center justify-center font-bold text-xl">
            News you can Trust.
        </div>
        <!-- Content Container -->
        <div class="text-center w-full mt-6">
            <h3 class="text-lg font-semibold">Stay up to date with the Latest!</h3>
            <p>
                Subscribe to our newsletter for the latest news straight into your
                inbox.
            </p>
            <form class="flex flex-wrap">
                <input type="email" placeholder="you@example.com"
                    class="w-full mx-70 my-4 py-2 text-center bg-slate-200 rounded placeholder:text-sm">
                <button type="submit"
                    class="w-full mx-70 py-2 bg-blue-500 text-white rounded">
                    Subscribe Now
                </button>
                <p class="w-full my-5 text-sm">
                    We value your privacy
                </p>
            </form>
        </div>
    </div>
</body>

</html>
